name: Publish to MCP Registry

# Standalone, on-demand publish of server.json to the MCP registry. Useful when
# the PyPI/npm packages already exist (so a full release re-run would fail on
# duplicate versions) but the registry entry still needs to be created/updated.
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish-mcp-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
